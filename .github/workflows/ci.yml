name: CI

on:
  push:
    branches: [main]
    paths:
      - 'chem-viz-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'chem-viz-app/**'

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chem-viz-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            chem-viz-app/server/package-lock.json
            chem-viz-app/client/package-lock.json

      - name: Install dependencies
        run: npm run install:all

      - name: Lint server
        run: npm run lint:server

      - name: Lint client
        run: npm run lint:client

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: chem-viz-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            chem-viz-app/server/package-lock.json
            chem-viz-app/client/package-lock.json

      - name: Install dependencies
        run: npm run install:all

      - name: Build server
        run: npm run build:server

      - name: Build client
        run: npm run build:client
